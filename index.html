<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Serviços - Luthieria</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { margin: 5px; padding: 8px; width: 100%; }
    button { padding: 10px; margin-top: 10px; }
    .card { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
    .kanban {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.coluna {
  min-width: 250px;
  background: #f4f4f4;
  padding: 10px;
  border-radius: 8px;
}

.coluna h3 {
  margin-top: 0;
  font-size: 16px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border-left: 5px solid #ccc;
}
  </style>
</head>
<body>

<h2>Nova Ordem de Serviço</h2>

<form id="form">
  <input id="cliente" placeholder="Cliente" required>
  <input id="telefone" placeholder="Telefone">
  <input id="instrumento" placeholder="Instrumento">
  <input id="problema" placeholder="Problema">
  
  <select id="status">
    <option value="entrada">Entrada</option>
    <option value="orcamento">Orçamento</option>
    <option value="andamento">Em andamento</option>
    <option value="pronto">Pronto</option>
  </select>

  <button type="submit">Salvar</button>
</form>


  <select id="filtroStatus">
  <option value="todos">Todos</option>
  <option value="entrada">Entrada</option>
  <option value="diagnostico">Diagnóstico</option>
  <option value="orcamento">Orçamento</option>
  <option value="aprovado">Aprovado</option>
  <option value="em_andamento">Em andamento</option>
  <option value="pronto">Pronto</option>
  <option value="entregue">Entregue</option>
</select>


<h2>Serviços</h2>
<div id="kanban" class="kanban"></div>

<script src="app.js"></script>

</body>

</html>
