<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços - Luthieria</title>
  <link rel="stylesheet" href="./style.css">
</head>


</head>

<body>


  <div id="form-container">
    <div class="form-header">
      <button onclick="fecharForm()">←</button>
      <h2>Nova Ordem de Serviço</h2>
    </div>

    <form id="form" class="form-app">

      <input id="cliente" placeholder="Nome do cliente" required>
      <input id="telefone" placeholder="WhatsApp">

      <input id="instrumento" placeholder="Instrumento">
      <textarea id="problema" placeholder="Problema"></textarea>

      <input id="orcamento" placeholder="Orçamento (R$)" type="number">

      <select id="pagamento">
        <option value="pendente">Pendente</option>
        <option value="pago">Pago</option>
      </select>

      <div class="form-actions">
        <button type="button" class="cancelar" onclick="fecharForm()">Cancelar</button>
        <button type="submit" class="salvar">Salvar</button>
      </div>

    </form>
  </div>


  <select id="filtroStatus">
    <option value="entrada">Entrada</option>
    <option value="diagnostico">Diagnóstico</option>
    <option value="orcamento">Orçamento</option>
    <option value="em_andamento">Em andamento</option>
    <option value="pronto">Pronto</option>
    <option value="entregue">Entregue</option>
  </select>



  <h2>Serviços</h2>
  <div id="kanban" class="kanban"></div>

  <button id="fab">+ Nova OS</button>

  <script src="app.js"></script>

</body>

</html>
